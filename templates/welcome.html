<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - PBL0203 AI Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #38bdf8;
            --text: #f0f6fc;
            --text-muted: #8b949e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .welcome-card {
            text-align: center;
            max-width: 600px;
            padding: 3rem;
            background: rgba(22, 27, 34, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            border-radius: 1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4);
            filter: brightness(1.1);
        }
        .meta {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: rgba(255,255,255,0.05);
            border-radius: 0.5rem;
            margin: 0.2rem;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="icon">📊</div>
        <h1>PBL0203 Analytics</h1>
        <p>
            Selamat datang di dashboard analisis data AI Student Life.<br>
            Project oleh <strong>Muhammad Hikmal Fadian</strong>.
        </p>
        
        <div style="margin-bottom: 2rem;">
            <span class="badge">Falcon</span>
            <span class="badge">Pandas</span>
            <span class="badge">Mangum</span>
            <span class="badge">Jinja2</span>
        </div>

        <a href="/pbl0203/" class="btn">Masuk Dashboard</a>

        <div class="meta">
            NIM 241080200069 • 2026
        </div>
    </div>
</body>
</html>
