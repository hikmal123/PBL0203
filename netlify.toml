# netlify.toml — Konfigurasi Netlify untuk PBL0203
# ==================================================
# Proyek ini adalah Python Falcon + Pandas + Jinja2.
# Menggunakan npm sebagai bridge untuk build pipeline di Netlify.
#
# Strategi: Static Site Generation (SSG)
#   1. npm install -> pip install (via postinstall)
#   2. npm run build -> python build.py
#   3. Netlify serve folder `public/` sebagai static site

[build]
  # Perintah build: Menggunakan npm script yang memanggil python build.py
  command = "npm run build"

  # Folder output: build.py menghasilkan file di folder public/
  publish = "public"

# ── Security Headers ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache static assets aggressively ──────────────────────
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
